<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Cozy Desk</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <div class="scene">
    <div class="wall"></div>
    <div class="desk"></div>
    <div id="sticky-wall"></div>
    <div class="table-area">
      <div class="laptop closed" id="laptop">
        <div class="laptop-base">
          <div class="apple-logo"></div>
        </div>
        <div class="laptop-lid"></div>
      </div>
      <div class="stickies" id="stickies"></div>
      <button class="add-sticky" id="addStickyBtn" title="Add new to-do note">+</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
