<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Real Desk</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <!-- Wall (background) -->
  <div class="wall"></div>

  <!-- Table: photo background from your image 1 -->
  <div class="table"></div>

  <!-- Sticky Note Stack - always visible -->
  <div class="sticky-stack" id="stickyStack">
    <img src="images/sticky-stack.png" alt="Sticky note pad" />
    <button id="pullNoteBtn" title="Pull a note">+</button>
  </div>

  <!-- Main Laptop (centered) -->
  <div class="laptop-wrap">
    <!-- Closed -->
    <img class="laptop-closed" id="laptopClosed" src="images/laptop-closed.png" alt="Closed MacBook" />
    <!-- Open (overlay, hidden by default) -->
    <img class="laptop-open" id="laptopOpen" src="images/laptop-open.png" alt="Open MacBook" />
  </div>

  <!-- Single note editor (when pulled from stack) -->
  <div class="note-editor" id="noteEditor">
    <textarea id="editorInput" maxlength="180"></textarea>
    <div class="editor-actions">
      <button id="stickBtn">Stick to wall</button>
      <button id="cancelBtn">Cancel</button>
    </div>
  </div>

  <!-- Wall post-its go here -->
  <div class="wall-notes" id="wallNotes"></div>

  <script src="script.js"></script>
</body>
</html>
